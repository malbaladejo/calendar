<h2 mat-dialog-title>Sélectionner une couleur</h2>
<mat-dialog-content>
  @for(color of colors;track color){
  <div [class]="['postit',color]" (click)="onSelectColor(color)"></div>
  }
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="onClose()">Annuler</button>
</mat-dialog-actions>
